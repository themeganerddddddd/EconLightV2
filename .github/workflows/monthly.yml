name: Monthly Econ Light Update

on:
  workflow_dispatch:
  schedule:
    - cron: "20 12 3 * *"

jobs:
  build-site-data:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run pipeline
        env:
          BLACKMARBLE_TOKEN: ${{ secrets.BLACKMARBLE_TOKEN }}
        run: |
          python scripts/fetch_blackmarble_monthly.py
          python scripts/build_metrics.py
          python scripts/export_site_data.py
          python scripts/make_social_card.py

      - name: Commit outputs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/derived site/data outputs/social
          git diff --staged --quiet || git commit -m "Update econ light data"
          git push