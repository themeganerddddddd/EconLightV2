name: Monthly Econ Light Update

on:
  workflow_dispatch:
  schedule:
    - cron: "20 12 3 * *"

jobs:
  build-site-data:
    runs-on: ubuntu-latest
    timeout-minutes: 240

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system packages
        run: |
          sudo apt-get update
          sudo apt-get install -y gdal-bin libgdal-dev

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build region files
        env:
          ACS_YEAR: 2022
          CARTO_YEAR: 2024
          CITIES_TOP_N: 200
        run: |
          python scripts/build_region_files.py

      - name: Run incremental pipeline
        env:
          BLACKMARBLE_TOKEN: ${{ secrets.BLACKMARBLE_TOKEN }}
          DATA_START: 2022-01-01
          DATA_END: 2026-02-01
          METROS_FILE: data/regions/us_metros_all.geojson
          STATES_FILE: data/regions/us_states_contiguous.geojson
          COUNTIES_FILE: data/regions/us_counties_contiguous.geojson
          CITIES_FILE: data/regions/us_cities_top200.geojson
          INCREMENTAL: "true"
        run: |
          python scripts/fetch_blackmarble_monthly.py
          python scripts/build_metrics.py
          python scripts/export_site_data.py

      - name: Commit updated outputs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/derived data/regions docs/data
          git diff --staged --quiet || git commit -m "Update econ light data"
          git push