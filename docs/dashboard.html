<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Econ Light Monitor Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="styles.css" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
  <header class="sub-hero">
    <div class="wrap sub-hero-inner">
      <div>
        <a class="back-link" href="index.html">← Home</a>
        <h1 id="dashboardTitle">Dashboard</h1>
        <p id="dashboardSubtitle">Explore detailed regional data.</p>
      </div>
      <div class="homepage-nav">
        <a class="dataset-link" href="dashboard.html?dataset=metros">Metros</a>
        <a class="dataset-link" href="dashboard.html?dataset=states">States</a>
        <a class="dataset-link" href="dashboard.html?dataset=counties">Counties</a>
        <a class="dataset-link" href="dashboard.html?dataset=cities">Cities</a>
        <a class="dataset-link" href="nowcast.html">Nowcasts</a>
        <a class="dataset-link" href="premium.html">Premium</a>
      </div>
    </div>
  </header>

  <main class="wrap">
    <section id="statusMount"></section>

    <section class="summary-grid">
      <div class="summary-card">
        <div class="summary-title">Headline Index</div>
        <div class="summary-number" id="heroIndex">--</div>
      </div>
      <div class="summary-card">
        <div class="summary-title">Top Region</div>
        <div class="summary-number small" id="heroTopRegion">--</div>
      </div>
      <div class="summary-card">
        <div class="summary-title">Weakest Region</div>
        <div class="summary-number small" id="heroBottomRegion">--</div>
      </div>
      <div class="summary-card">
        <div class="summary-title">Latest Month</div>
        <div class="summary-number small" id="latestMonthText">--</div>
      </div>
    </section>

    <section class="card">
      <div class="card-header">
        <h2>Headline Index</h2>
      </div>
      <div class="chart-box">
        <canvas id="indexChart"></canvas>
      </div>
    </section>

    <section class="grid">
      <div class="card">
        <div class="card-header"><h2>Top Brightening</h2></div>
        <div class="table-wrap">
          <table id="brightTable">
            <thead><tr><th>Region</th><th>YoY</th><th>MoM</th><th>Trend</th></tr></thead>
            <tbody></tbody>
          </table>
        </div>
      </div>

      <div class="card">
        <div class="card-header"><h2>Top Dimming</h2></div>
        <div class="table-wrap">
          <table id="dimTable">
            <thead><tr><th>Region</th><th>YoY</th><th>MoM</th><th>Trend</th></tr></thead>
            <tbody></tbody>
          </table>
        </div>
      </div>
    </section>

    <section class="card">
      <div class="card-header"><h2 id="regionTitle">Region Explorer</h2></div>
      <div class="region-controls">
        <div class="region-picker-wrap">
          <label for="regionSearch">Search region</label>
          <input id="regionSearch" type="text" placeholder="Type a region name..." />
        </div>
        <div class="region-picker-wrap">
          <label for="regionPicker">Choose region</label>
          <select id="regionPicker"></select>
        </div>
      </div>
      <div class="chart-box large">
        <canvas id="regionChart"></canvas>
      </div>
    </section>
  </main>

  <script src="dashboard.js"></script>
</body>
</html>
